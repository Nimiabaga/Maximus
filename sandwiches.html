<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sandwiches — Maximus Lounge & Bar</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>
<body>
  <header class="animate__animated animate__fadeInDown">
    <img src="images/maximus.png" alt="Maximus Lounge & Bar" class="logo" />
  </header>

  <!-- Sandwiches Section -->
  <div class="menu-banner"><h2>SANDWICHES</h2></div>
  <main>
    <div class="food-grid">
      <!-- Chicken Sandwiches -->
      <div class="food-card">
        <img src="images/chicken-sandwiches.jpg" alt="Chicken Sandwiches" />
        <div class="food-info">
          <h4>Chicken Sandwiches</h4>
          <p>₦4,500</p>
        </div>
      </div>

      <!-- Beef Sandwiches -->
      <div class="food-card">
        <img src="images/beef-sandwiches.jpg" alt="Beef Sandwiches" />
        <div class="food-info">
          <h4>Beef Sandwiches</h4>
          <p>₦5,000</p>
        </div>
      </div>

      <!-- Vegetable Sandwiches -->
      <div class="food-card">
        <img src="images/vegetable-sandwiches.jpg" alt="Vegetable Sandwiches" />
        <div class="food-info">
          <h4>Vegetable Sandwiches</h4>
          <p>₦3,500</p>
        </div>
      </div>
    </div>

    <div class="tray-note">
      Takeout ₦1000
    </div>

    <div class="page-back">
      <a href="./food.html">← Back to Food</a>
    </div>
  </main>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <a href="./index.html">Home</a>
    <a href="./food.html" class="active">Food</a>
    <a href="./drinks.html">Drinks</a>
    <a href="./contact.html">Contact</a>
  </nav>

  <script src="app.js"></script>
</body>
</html>
