<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Food — Maximus Lounge & Bar</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

  <style>
    .menu-toggle {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin: 1.2rem auto 0;
      padding: 0 1rem 6rem;
      max-width: 500px;
    }

    .menu-toggle a {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 1rem;
      padding: 0.7rem 1rem;
      border-radius: 16px;
      font-weight: 600;
      text-decoration: none;
      width: 100%;
      background: #161616;
      border: 1px solid rgba(255,255,255,0.06);
      border-left: 3px solid #e60000;
      color: #efefef;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      text-transform: capitalize;
      box-sizing: border-box;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .menu-toggle a img {
      width: 58px;
      height: 58px;
      min-width: 58px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    /* Chevron arrow on the right */
    .menu-toggle a::after {
      content: '›';
      margin-left: auto;
      font-size: 1.4rem;
      color: #555;
      font-weight: 300;
      line-height: 1;
      transition: color 0.2s ease, transform 0.2s ease;
    }

    .menu-toggle a:hover {
      background: #1e1e1e;
      transform: translateX(4px);
      box-shadow: 0 4px 20px rgba(230,0,0,0.2);
      border-left-color: #ff3333;
    }

    .menu-toggle a:hover::after {
      color: #e60000;
      transform: translateX(3px);
    }

    .menu-toggle a:active {
      transform: translateX(2px);
    }

    .menu-toggle a:link,
    .menu-toggle a:visited,
    .menu-toggle a:focus {
      color: #efefef;
    }
  </style>
</head>
<body>
  <header class="animate__animated animate__fadeInDown">
    <img src="images/maximus.png" alt="Maximus Lounge & Bar" class="logo" />
  </header>

  <div class="menu-banner"><h2>FOOD MENU</h2></div>

  <div class="menu-toggle">
    <a href="./bites.html"><img src="images/chicken-wings.jpg" alt="Bites">Bites</a>
    <a href="./appetizers.html"><img src="images/small-chops-platter.jpg" alt="Appetizers">Appetizers</a>
    <a href="./rice.html"><img src="images/jollof-rice.jpg" alt="Rice">Rice</a>
    <a href="./salad.html"><img src="images/chicken-salad.jpg" alt="Salad">Salad</a>
    <a href="./noodles.html"><img src="images/noodles-chicken.jpg" alt="Noodles">Noodles</a>
    <a href="./burger.html"><img src="images/beef-burger.jpg" alt="Burger">Burger</a>
    <a href="./pasta.html"><img src="images/chicken-alfredo.jpg" alt="Pasta">Pasta</a>
    <a href="./platter.html"><img src="images/platter-maximus.jpg" alt="Platter">Platter</a>
    <a href="./bbq-fries.html"><img src="images/french-fries.jpg" alt="BBQ Fries">BBQ Fries</a>
    <a href="./shawarma.html"><img src="images/chicken-shawarma.jpg" alt="Shawarma">Shawarma</a>
  </div>

  <nav class="bottom-nav">
    <a href="./index.html">Home</a>
    <a href="./food.html" class="active">Food</a>
    <a href="./drinks.html">Drinks</a>
    <a href="./contact.html">Contact</a>
  </nav>
</body>
</html>
