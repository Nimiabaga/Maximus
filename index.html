<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Maximus Lounge & Bar</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>
<body>

  <!-- Splash Screen -->
  <div class="splash" id="splash">
    <img src="images/maximus.png" alt="Maximus" class="splash-logo" />
    <div class="splash-bar"></div>
  </div>

  <!-- Hero Section -->
  <section class="hero">
    <img src="images/contact.jpg" alt="Maximus Lounge" class="hero-bg-img" />
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <img src="images/maximus.png" alt="Maximus Lounge & Bar" class="hero-logo animate__animated animate__fadeInDown" />
      <p class="hero-tagline animate__animated animate__fadeIn animate__delay-1s">Where Every Night Becomes Extraordinary</p>
      <div class="hero-ctas animate__animated animate__fadeInUp animate__delay-1s">
        <a href="./food.html" class="cta-btn cta-primary">Food Menu</a>
        <a href="./drinks.html" class="cta-btn cta-secondary">Drinks Menu</a>
      </div>
    </div>
    <a href="#featured" class="scroll-hint">&#8595;</a>
  </section>

  <!-- Featured Section -->
  <section id="featured">
    <div class="menu-banner"><h2>FEATURED</h2></div>

    <div class="food-grid">

      <div class="food-card scroll-reveal">
        <img src="images/maximus-special-rice.jpg" alt="Maximus Special Rice" />
        <div class="food-info">
          <h4>Maximus Special Rice</h4>
          <p>₦6,000</p>
        </div>
      </div>

      <div class="food-card scroll-reveal">
        <img src="images/maximus-chicken-chips.jpg" alt="Maximus Special Burger with Chicken & Chips" />
        <div class="food-info">
          <h4>Maximus Special Burger</h4>
          <p>₦10,000</p>
        </div>
      </div>

      <div class="food-card scroll-reveal">
        <img src="images/platter-maximus.jpg" alt="Platter Maximus" />
        <div class="food-info">
          <h4>Platter Maximus</h4>
          <p>₦55,000</p>
        </div>
      </div>

      <div class="food-card scroll-reveal">
        <img src="images/maximus-salad.jpg" alt="Maximus Salad" />
        <div class="food-info">
          <h4>Maximus Salad</h4>
          <p>₦15,000</p>
        </div>
      </div>

    </div>

    <div class="tray-note">Images are illustrative. Prices include VAT where applicable.</div>
  </section>

  <nav class="bottom-nav">
    <a href="./index.html" class="active">Home</a>
    <a href="./food.html">Food</a>
    <a href="./drinks.html">Drinks</a>
    <a href="./contact.html">Contact</a>
  </nav>

  <script src="app.js"></script>
</body>
</html>
