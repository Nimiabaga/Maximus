<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BBQ & Grills — Maximus Lounge & Bar</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>
<body>
  <header class="animate__animated animate__fadeInDown">
    <img src="images/maximus.png" alt="Maximus Lounge & Bar" class="logo" />
  </header>

  <!-- BBQ & Grills Section -->
  <div class="menu-banner"><h2>BBQ & GRILLS</h2></div>
  <main>
    <div class="food-grid">
      <!-- Full Grilled Chicken -->
      <div class="food-card">
        <img src="images/grilled-chicken.jpg" alt="Full Grilled Chicken" />
        <div class="food-info">
          <h4>Full Grilled Chicken</h4>
          <p>₦25,000</p>
        </div>
      </div>

      <!-- Croaker Fish -->
      <div class="food-card">
        <img src="images/croaker-fish.jpg" alt="Croaker Fish" />
        <div class="food-info">
          <h4>Croaker Fish</h4>
          <p>₦30,000</p>
        </div>
      </div>

      <!-- Catfish -->
      <div class="food-card">
        <img src="images/cat-fish.jpg" alt="Catfish" />
        <div class="food-info">
          <h4>Catfish</h4>
          <p>₦20,000</p>
        </div>
      </div>
    </div>

    <div class="tray-note">
      Takeout ₦1000
    </div>

    <div class="page-back">
      <a href="./food.html">← Back to Food</a>
    </div>
  </main>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <a href="./index.html">Home</a>
    <a href="./food.html" class="active">Food</a>
    <a href="./drinks.html">Drinks</a>
    <a href="./contact.html">Contact</a>
  </nav>

  <script src="app.js"></script>
</body>
</html>
