<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact — Maximus Lounge & Bar</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>

    /* === Hero placeholder === */
    .contact-hero-blank {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 1rem 1.5rem;
      background: #000;
    }

    /* === Section label === */
    .section-label {
      text-align: center;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #e60000;
      margin: 2rem 0 1rem;
    }

    /* === Contact Cards Grid === */
    .contact-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
      padding: 0 1rem;
      max-width: 500px;
      margin: 0 auto;
    }

    .contact-card {
      background: #141414;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 18px;
      padding: 1.4rem 1rem 1.2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.7rem;
      text-decoration: none;
      color: #fff;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }

    .contact-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 28px rgba(0,0,0,0.6);
    }

    .contact-card .icon-circle {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
    }

    .contact-card .label {
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
    }

    .contact-card .value {
      font-size: 0.82rem;
      font-weight: 600;
      color: #fff;
      text-align: center;
      line-height: 1.4;
    }

    /* icon circle colors */
    .ic-red   { background: rgba(230,0,0,0.15);    color: #e60000; border: 1px solid rgba(230,0,0,0.3); }
    .ic-blue  { background: rgba(30,120,255,0.12); color: #4d94ff; border: 1px solid rgba(30,120,255,0.25); }
    .ic-green { background: rgba(37,211,102,0.12); color: #25D366; border: 1px solid rgba(37,211,102,0.25); }
    .ic-pink  { background: rgba(200,50,150,0.12); color: #e040a0; border: 1px solid rgba(200,50,150,0.25); }

    /* === Address full-width row === */
    .contact-address {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: #141414;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 18px;
      padding: 1.1rem 1.2rem;
      margin: 0.75rem 1rem 0;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }

    .contact-address .icon-circle {
      width: 48px;
      height: 48px;
      min-width: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    .contact-address .addr-text .label {
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      display: block;
      margin-bottom: 0.25rem;
    }

    .contact-address .addr-text .value {
      font-size: 0.9rem;
      font-weight: 600;
      color: #fff;
    }

    /* === Map === */
    .map-wrap {
      margin: 1.8rem 1rem 0;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.07);
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    .map-wrap iframe {
      width: 100%;
      height: 220px;
      border: 0;
      display: block;
    }

    /* === Footer === */
    .footer-note {
      text-align: center;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.08em;
      margin: 2rem 0 7rem;
    }

    /* === Floating Buttons === */
    .fab-stack {
      position: fixed;
      bottom: 90px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 1000;
    }

    .fab {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      color: #fff;
      text-decoration: none;
      box-shadow: 0 4px 14px rgba(0,0,0,0.4);
      transition: transform 0.2s ease;
    }

    .fab:hover { transform: scale(1.1); }
    .fab-whatsapp { background: #25D366; }
    .fab-call     { background: #e60000; }

  </style>
</head>
<body>

  <!-- Hero placeholder (image coming soon) -->
  <div class="contact-hero-blank">
    <img src="images/maximus.png" alt="Maximus Lounge & Bar" class="logo" style="margin-bottom:0.5rem;" />
    <p style="font-size:0.75rem;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.35);margin:0;">Maximus Lounge &amp; Bar</p>
  </div>

  <!-- Section label -->
  <p class="section-label animate__animated animate__fadeIn">Get in Touch</p>

  <!-- Contact Cards -->
  <div class="contact-grid animate__animated animate__fadeInUp">

    <a href="tel:+2348136253783" class="contact-card">
      <div class="icon-circle ic-red"><i class="fas fa-phone"></i></div>
      <span class="label">Phone</span>
      <span class="value">0813 625 3783</span>
    </a>

    <a href="mailto:aifbenjack@gmail.com" class="contact-card">
      <div class="icon-circle ic-blue"><i class="fas fa-envelope"></i></div>
      <span class="label">Email</span>
      <span class="value">aifbenjack@gmail.com</span>
    </a>

    <a href="https://wa.me/2348136253783?text=Hello%2C%20I%27d%20like%20to%20make%20an%20enquiry."
       target="_blank" rel="noopener" class="contact-card">
      <div class="icon-circle ic-green"><i class="fab fa-whatsapp"></i></div>

    <a href="https://www.instagram.com/maxloungephc"

  </div>

  <!-- Address full row -->
  <div class="contact-address animate__animated animate__fadeInUp">

  <!-- Map -->
  <div class="map-wrap animate__animated animate__fadeIn">
    <iframe
      src="https://www.google.com/maps?q=41+Woji+Road,+GRA,+Port+Harcourt,+Nigeria&output=embed"
      allowfullscreen loading="lazy">
    </iframe>
  </div>

  <p class="footer-note">&copy; 2025 Maximus Lounge &amp; Bar. All rights reserved.</p>

  <!-- Floating buttons -->
  <div class="fab-stack">
    <a href="https://wa.me/2348136253783?text=Hello%2C%20I%27d%20like%20to%20make%20an%20enquiry."
       class="fab fab-whatsapp" target="_blank" title="WhatsApp">
      <i class="fab fa-whatsapp"></i>
    </a>
    <a href="tel:+2348136253783" class="fab fab-call" title="Call us">
      <i class="fas fa-phone"></i>
    </a>
  </div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <a href="index.html">Home</a>
    <a href="food.html">Food</a>
    <a href="drinks.html">Drinks</a>
    <a href="contact.html" class="active">Contact</a>
  </nav>


  <script src="app.js"></script>
</body>
</html>
